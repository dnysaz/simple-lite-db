<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLiteDB Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .sidebar-item-active { background: rgba(79, 70, 229, 0.15); color: #818CF8; border-right: 3px solid #6366f1; }
    </style>
</head>
<body class="min-h-screen custom-scrollbar overflow-hidden">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0F172A] p-4">
        <div class="w-full max-w-md glass rounded-[2.5rem] p-10 shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-500/10 rounded-2xl mb-4 border border-indigo-500/20">
                    <span class="text-3xl">🚀</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">Super Admin</h1>
                <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest font-bold">SimpleLiteDB Explorer</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Username (IP)</label>
                    <input type="text" id="username" required placeholder="145.79.12.100" class="w-full px-5 py-4 rounded-2xl bg-slate-800/50 border border-slate-700 outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Dashboard Password</label>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl bg-slate-800/50 border border-slate-700 outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95">Enter Admin Panel</button>
            </form>
            <p id="loginError" class="text-rose-500 text-sm text-center mt-6 hidden"></p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="dashboard" class="hidden h-screen flex flex-col">
        <!-- Top Nav -->
        <header class="h-16 glass border-b border-white/5 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-black">S</div>
                <h1 class="font-bold tracking-tight text-lg">SimpleLiteDB <span class="text-indigo-400">Explorer</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p id="userDisplay" class="text-xs font-bold text-slate-400"></p>
                    <p class="text-[10px] text-emerald-500 font-black uppercase tracking-tighter animate-pulse">● System Online</p>
                </div>
                <button onclick="location.reload()" class="p-2 hover:bg-white/5 rounded-full transition-colors">🚪</button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-72 glass border-r border-white/5 flex flex-col shrink-0 overflow-y-auto custom-scrollbar">
                <div class="p-6">
                    <button onclick="showCreateDb()" class="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-sm font-bold transition-all mb-8">
                        + New Database
                    </button>
                    
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-4 px-2">Databases</h3>
                    <div id="dbList" class="space-y-4">
                        <!-- Databases and tables injected here -->
                        <div class="text-slate-600 text-xs px-2 italic">Scanning...</div>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main id="mainContent" class="flex-1 flex flex-col p-8 overflow-y-auto custom-scrollbar relative">
                
                <!-- Welcome Screen -->
                <div id="view-welcome" class="flex-1 flex flex-col items-center justify-center text-center opacity-40">
                    <div class="text-6xl mb-6">⚡</div>
                    <h2 class="text-3xl font-black mb-2">Welcome, Super Admin</h2>
                    <p class="text-slate-400">Select a database or table from the sidebar to manage your data.</p>
                </div>

                <!-- Table View -->
                <div id="view-table" class="hidden space-y-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <h2 id="activeTableName" class="text-3xl font-black tracking-tight"></h2>
                            <p id="activeDbName" class="text-indigo-400 text-xs font-bold uppercase tracking-widest mt-1"></p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="refreshTableData()" class="p-3 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors">🔄</button>
                            <button onclick="showApiInfo()" class="px-4 py-2 bg-indigo-500/10 text-indigo-400 text-xs font-bold rounded-xl border border-indigo-500/20">API Usage</button>
                        </div>
                    </div>

                    <!-- Grid -->
                    <div class="bg-slate-900/50 rounded-[2rem] border border-white/5 overflow-hidden shadow-2xl">
                        <div class="overflow-x-auto custom-scrollbar">
                            <table class="w-full text-left border-collapse">
                                <thead id="thead" class="text-[10px] font-black uppercase tracking-widest text-slate-500 bg-black/20 border-b border-white/5"></thead>
                                <tbody id="tbody" class="text-sm text-slate-300"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- SQL View -->
                <div id="view-sql" class="hidden space-y-6">
                    <h2 class="text-3xl font-black tracking-tight">SQL Console <span id="sqlDbName" class="text-indigo-500"></span></h2>
                    <textarea id="sqlInput" class="w-full h-48 bg-black/40 rounded-3xl p-6 font-mono text-indigo-300 text-sm outline-none border border-white/10 focus:border-indigo-500/50 transition-all shadow-inner" placeholder="SELECT * FROM table_name;"></textarea>
                    <button onclick="runSql()" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-2xl shadow-xl active:scale-95 transition-all">EXECUTE QUERY</button>
                    
                    <div id="sqlResult" class="bg-slate-900/80 rounded-3xl border border-white/10 overflow-hidden">
                        <!-- Query results -->
                    </div>
                </div>

                <!-- API Info Modal (Injected) -->
                <div id="apiModal" class="hidden fixed inset-0 z-[60] bg-black/80 backdrop-blur flex items-center justify-center p-6">
                    <div class="w-full max-w-2xl bg-[#1E293B] rounded-[2.5rem] p-10 border border-white/10">
                        <h3 class="text-2xl font-black mb-6">API Integration Guide</h3>
                        <div id="apiContent" class="space-y-4 font-mono text-sm"></div>
                        <button onclick="document.getElementById('apiModal').classList.add('hidden')" class="mt-8 w-full py-4 bg-slate-800 rounded-2xl font-bold">Close</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let dashToken = '';
        let allDatabases = [];
        let currentActive = { db: '', table: '', apiKey: '' };

        const el = (id) => document.getElementById(id);

        // 1. LOGIN
        el('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = el('username').value;
            const password = el('password').value;
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.detail);

                dashToken = data.token;
                el('loginOverlay').classList.add('hidden');
                el('dashboard').classList.remove('hidden');
                el('userDisplay').innerText = username;
                loadAllDatabases();
            } catch (err) {
                el('loginError').innerText = "❌ " + err.message;
                el('loginError').classList.remove('hidden');
            }
        };

        // 2. LOAD DATABASES
        async function loadAllDatabases() {
            try {
                const res = await fetch('/admin/databases', {
                    headers: { 'Authorization': `Bearer ${dashToken}` }
                });
                const data = await res.json();
                if (!data.success) throw new Error();

                allDatabases = data.databases;
                renderSidebar();
            } catch (err) { alert("Failed to load databases"); }
        }

        async function renderSidebar() {
            const list = el('dbList');
            list.innerHTML = '';

            for (const db of allDatabases) {
                const dbDiv = document.createElement('div');
                dbDiv.className = "space-y-1";
                
                // Get tables for this db
                let tables = [];
                try {
                    const res = await fetch('/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${db.api_key}` },
                        body: JSON.stringify({ database: db.name, sql: "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'" })
                    });
                    const d = await res.json();
                    tables = d.rows || [];
                } catch (e) {}

                dbDiv.innerHTML = `
                    <div class="flex items-center justify-between group">
                        <button onclick="showSql('${db.name}', '${db.api_key}')" class="text-sm font-bold text-slate-300 hover:text-white px-2 py-1 flex items-center gap-2">
                            <span>📦</span> ${db.name}
                        </button>
                        <span class="text-[9px] bg-slate-800 text-slate-500 px-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">SQL</span>
                    </div>
                    <div class="ml-6 space-y-1 border-l border-slate-800 pl-3">
                        ${tables.map(t => `
                            <button onclick="showTable('${db.name}', '${t.name}', '${db.api_key}')" class="w-full text-left text-xs text-slate-500 hover:text-indigo-400 py-1 block truncate">
                                ${t.name}
                            </button>
                        `).join('')}
                    </div>
                `;
                list.appendChild(dbDiv);
            }
        }

        // 3. NAVIGATION & VIEW
        function switchView(viewId) {
            ['view-welcome', 'view-table', 'view-sql'].forEach(id => el(id).classList.add('hidden'));
            el(viewId).classList.remove('hidden');
        }

        async function showTable(db, table, apiKey) {
            currentActive = { db, table, apiKey };
            el('activeTableName').innerText = table;
            el('activeDbName').innerText = `Database: ${db}`;
            switchView('view-table');
            refreshTableData();
        }

        function showSql(db, apiKey) {
            currentActive = { db, table: '', apiKey };
            el('sqlDbName').innerText = `(${db})`;
            el('sqlResult').innerHTML = '';
            switchView('view-sql');
        }

        async function refreshTableData() {
            const { db, table, apiKey } = currentActive;
            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ database: db, sql: `SELECT * FROM ${table} LIMIT 100` })
                });
                const data = await res.json();
                renderGrid(data.rows, el('thead'), el('tbody'));
            } catch (err) { alert(err.message); }
        }

        function renderGrid(rows, thead, tbody) {
            if (!rows || rows.length === 0) {
                thead.innerHTML = '';
                tbody.innerHTML = '<tr><td class="p-10 text-center text-slate-600">No data found in this table.</td></tr>';
                return;
            }
            const cols = Object.keys(rows[0]);
            thead.innerHTML = `<tr>${cols.map(c => `<th class="p-4 border-r border-white/5 last:border-0">${c}</th>`).join('')}</tr>`;
            tbody.innerHTML = rows.map(r => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    ${cols.map(c => `<td class="p-4 border-r border-white/5 last:border-0 font-mono text-[11px] text-slate-400 truncate max-w-[200px]">${r[c]}</td>`).join('')}
                </tr>
            `).join('');
        }

        async function runSql() {
            const sql = el('sqlInput').value;
            const { db, apiKey } = currentActive;
            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ database: db, sql })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                const resultDiv = el('sqlResult');
                resultDiv.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead id="sthead" class="bg-black/20 text-[10px] font-black uppercase tracking-widest text-slate-500"></thead><tbody id="stbody"></tbody></table></div>';
                renderGrid(data.rows, el('sthead'), el('stbody'));
                
                // Refresh sidebar in case of CREATE/DROP
                if (sql.toUpperCase().includes('TABLE')) loadAllDatabases();
            } catch (err) { alert(err.message); }
        }

        async function showCreateDb() {
            const name = prompt("Enter new database name:");
            if (!name) return;
            try {
                const res = await fetch('/admin/create_db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${dashToken}` },
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                if (data.success) {
                    alert(`✅ Database ${data.name} created!\nAPI KEY: ${data.api_key}`);
                    loadAllDatabases();
                } else {
                    alert("❌ Error: " + data.error);
                }
            } catch (err) { alert(err.message); }
        }

        function showApiInfo() {
            const { db, table, apiKey } = currentActive;
            const baseUrl = window.location.origin;
            el('apiModal').classList.remove('hidden');
            el('apiContent').innerHTML = `
                <div class="p-4 bg-black/40 rounded-xl space-y-2">
                    <p class="text-indigo-400"># Method: POST</p>
                    <p class="text-indigo-400"># URL: ${baseUrl}/query</p>
                    <p class="text-slate-500"># Headers:</p>
                    <p>Authorization: Bearer ${apiKey}</p>
                    <p>Content-Type: application/json</p>
                    <p class="text-slate-500 mt-4"># Body:</p>
                    <p>{ "database": "${db}", "sql": "SELECT * FROM ${table}" }</p>
                </div>
            `;
        }
    </script>
</body>
</html>
