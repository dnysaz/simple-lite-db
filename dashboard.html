<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLiteDB Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen custom-scrollbar">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0F172A] p-4">
        <div class="w-full max-w-md glass rounded-[2.5rem] p-10 shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-500/10 rounded-2xl mb-4 border border-indigo-500/20">
                    <span class="text-3xl">🛡️</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">Lite Explorer</h1>
                <p class="text-slate-400 mt-2">Manage your SQLite databases over HTTP</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Database Name</label>
                    <input type="text" id="dbName" required placeholder="e.g. online-note" 
                           class="w-full px-5 py-4 rounded-2xl bg-slate-800/50 border border-slate-700 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-600">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">API Key</label>
                    <input type="password" id="apiKey" required placeholder="Paste your API key here" 
                           class="w-full px-5 py-4 rounded-2xl bg-slate-800/50 border border-slate-700 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all placeholder:text-slate-600 text-indigo-400">
                </div>
                <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-500/20 active:scale-95 transition-all mt-4">
                    Unlock Database
                </button>
            </form>
            <p id="loginError" class="text-rose-500 text-sm text-center mt-6 hidden font-medium"></p>
        </div>
    </div>

    <!-- Main Dashboard (Hidden by default) -->
    <div id="dashboard" class="hidden h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="glass border-b border-white/5 px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center font-black text-xl shadow-lg shadow-indigo-500/30">L</div>
                <h2 id="currentDbTitle" class="text-lg font-bold tracking-tight"></h2>
            </div>
            <div class="flex items-center gap-4">
                <span class="flex items-center gap-2 px-3 py-1 bg-emerald-500/10 text-emerald-400 rounded-full text-xs font-bold border border-emerald-500/20 uppercase tracking-tighter">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Connected
                </span>
                <button onclick="logout()" class="text-slate-400 hover:text-white text-sm font-bold transition-colors">Logout</button>
            </div>
        </nav>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-72 glass border-r border-white/5 p-6 flex flex-col gap-8">
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-4">Tables</h3>
                    <div id="tableList" class="space-y-1 custom-scrollbar overflow-y-auto max-h-[300px]">
                        <!-- Tables will appear here -->
                    </div>
                </div>
                <div>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-4">Quick Actions</h3>
                    <button onclick="showCreateModal()" class="w-full py-3 px-4 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 text-sm font-bold rounded-xl border border-indigo-500/20 transition-all text-left flex items-center gap-3">
                        <span class="text-lg">+</span> Create New Table
                    </button>
                </div>
            </aside>

            <!-- Content Area -->
            <main class="flex-1 flex flex-col overflow-hidden p-8">
                <div id="welcomeScreen" class="flex-1 flex flex-col items-center justify-center text-center opacity-50">
                    <span class="text-6xl mb-4">📂</span>
                    <h3 class="text-xl font-bold">Select a table to browse data</h3>
                    <p class="text-slate-400">Or execute a custom SQL query below</p>
                </div>

                <div id="dataTable" class="hidden flex-1 flex flex-col overflow-hidden bg-slate-900/50 rounded-3xl border border-white/5">
                    <div class="p-6 border-b border-white/5 flex items-center justify-between">
                        <h3 id="tableNameDisplay" class="text-xl font-bold text-white"></h3>
                        <div class="flex gap-2">
                            <button onclick="refreshData()" class="p-2 text-slate-400 hover:text-white transition-colors">🔄</button>
                            <button onclick="deleteTable()" class="p-2 text-rose-500/50 hover:text-rose-500 transition-colors">🗑️</button>
                        </div>
                    </div>
                    <div class="flex-1 overflow-auto custom-scrollbar p-1">
                        <table class="w-full text-left border-collapse">
                            <thead id="tableHead" class="sticky top-0 bg-slate-900 z-10 text-xs font-bold text-slate-500 uppercase tracking-widest border-b border-white/10"></thead>
                            <tbody id="tableBody" class="text-slate-300 text-sm"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Console -->
                <div class="mt-8 glass rounded-3xl p-6 shadow-xl">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-indigo-400">SQL Console</h3>
                        <button onclick="executeSQL()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-black rounded-full transition-all active:scale-95">RUN QUERY</button>
                    </div>
                    <textarea id="sqlConsole" placeholder="SELECT * FROM table_name WHERE id = 1;" 
                              class="w-full h-24 bg-black/30 rounded-2xl p-4 font-mono text-sm text-indigo-300 outline-none border border-white/5 focus:border-indigo-500/30 transition-all resize-none"></textarea>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal for Create Table (Simulated for speed) -->
    <script>
        let config = { db: '', key: '' };
        let activeTable = '';

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const db = document.getElementById('dbName').value;
            const key = document.getElementById('apiKey').value;
            const errorEl = document.getElementById('loginError');

            errorEl.classList.add('hidden');

            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ database: db, sql: "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'" })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                config = { db, key };
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('currentDbTitle').innerText = db.toUpperCase();
                renderTables(data.rows);
            } catch (err) {
                errorEl.innerText = "❌ Access Denied: " + err.message;
                errorEl.classList.remove('hidden');
            }
        };

        function renderTables(rows) {
            const list = document.getElementById('tableList');
            list.innerHTML = rows.map(r => `
                <button onclick="loadTable('${r.name}')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all flex items-center gap-3 text-slate-400 hover:text-white font-medium">
                    <span class="text-slate-600">#</span> ${r.name}
                </button>
            `).join('');
        }

        async function loadTable(name) {
            activeTable = name;
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('dataTable').classList.remove('hidden');
            document.getElementById('tableNameDisplay').innerText = name;
            refreshData();
        }

        async function refreshData() {
            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                    body: JSON.stringify({ database: config.db, sql: `SELECT * FROM ${activeTable} LIMIT 100` })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                renderRows(data.rows);
            } catch (err) { alert(err.message); }
        }

        function renderRows(rows) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            
            if (rows.length === 0) {
                head.innerHTML = "";
                body.innerHTML = "<tr><td class='p-12 text-center text-slate-500'>Empty table</td></tr>";
                return;
            }

            const cols = Object.keys(rows[0]);
            head.innerHTML = `<tr>${cols.map(c => `<th class="p-4">${c}</th>`).join('')}</tr>`;
            body.innerHTML = rows.map(r => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    ${cols.map(c => `<td class="p-4 text-slate-400 font-mono text-xs truncate max-w-[200px]">${r[c]}</td>`).join('')}
                </tr>
            `).join('');
        }

        async function executeSQL() {
            const sql = document.getElementById('sqlConsole').value;
            if (!sql) return;
            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                    body: JSON.stringify({ database: config.db, sql })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                
                if (Array.isArray(data.rows)) {
                    renderRows(data.rows);
                    document.getElementById('welcomeScreen').classList.add('hidden');
                    document.getElementById('dataTable').classList.remove('hidden');
                    document.getElementById('tableNameDisplay').innerText = "Query Result";
                } else {
                    alert("✅ SQL Executed Successfully");
                }
            } catch (err) { alert("❌ SQL Error: " + err.message); }
        }

        function logout() {
            location.reload();
        }

        async function deleteTable() {
            if (!confirm(`Are you sure you want to delete table '${activeTable}'?`)) return;
            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                    body: JSON.stringify({ database: config.db, sql: `DROP TABLE ${activeTable}` })
                });
                location.reload();
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
