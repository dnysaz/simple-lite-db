<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLiteDB | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-grid { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 32px 32px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-white bg-grid text-slate-800 overflow-hidden">

    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="w-16 h-16 bg-[#3ecf8e] rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-emerald-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-1">SimpleLiteDB</h1>
            <p class="text-slate-400 text-[9px] font-black uppercase tracking-[0.3em]">Secure Admin Access</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white border border-slate-100 rounded-[2rem] p-10 shadow-[0_20px_50px_rgba(0,0,0,0.04)] animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-150">
            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Username (VPS IP)</label>
                    <div class="relative">
                        <input type="text" id="username" required placeholder="e.g. 145.79.12.100" 
                            class="w-full px-5 py-3.5 bg-slate-50/50 border border-slate-100 rounded-2xl outline-none focus:border-[#3ecf8e] focus:bg-white text-sm transition-all text-slate-900 placeholder:text-slate-300">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full px-5 py-3.5 bg-slate-50/50 border border-slate-100 rounded-2xl outline-none focus:border-[#3ecf8e] focus:bg-white text-sm transition-all text-slate-900 placeholder:text-slate-300">
                    </div>
                </div>
                <button type="submit" class="w-full py-4 bg-[#3ecf8e] hover:bg-[#34b27b] text-white font-black rounded-2xl text-[11px] uppercase tracking-[0.2em] transition-all shadow-lg shadow-emerald-100 active:scale-95 mt-4">
                    Unlock Dashboard
                </button>
            </form>
            <p id="loginError" class="text-rose-500 text-[10px] text-center mt-6 hidden font-black p-3 bg-rose-50 rounded-xl border border-rose-100"></p>
        </div>

        <p class="text-center text-slate-500 text-[10px] mt-12 font-bold uppercase tracking-widest">
            &copy; 2024 SimpleLiteDB &bull; System Active
        </p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = e.target.querySelector('button');

            btn.innerText = 'AUTHENTICATING...';
            btn.disabled = true;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.detail);

                // Store token and redirect
                localStorage.setItem('slite_token', data.token);
                localStorage.setItem('slite_user', username);
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.innerText = "ACCESS DENIED: " + err.message.toUpperCase();
                errorEl.classList.remove('hidden');
                btn.innerText = 'UNLOCK DASHBOARD';
                btn.disabled = false;
            }
        };

        // If already logged in, skip to dashboard
        if (localStorage.getItem('slite_token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
