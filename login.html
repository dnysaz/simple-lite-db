<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteDB Admin | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/html/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-screen flex items-center justify-center bg-[#F1F5F9] text-slate-700 font-inter">

    <div class="w-full max-w-sm bg-white border border-slate-200 rounded-md p-10">
        <div class="mb-8 text-center">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">LiteDB Admin</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Vercel-ready SQLite Explorer</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Username (VPS IP)</label>
                <input type="text" id="username" required placeholder="e.g. 145.79.12.100" 
                       class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-indigo-500 text-sm transition-all">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1.5">Dashboard Password</label>
                <input type="password" id="password" required placeholder="••••••••" 
                       class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-md outline-none focus:border-indigo-500 text-sm transition-all">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-md text-xs uppercase tracking-widest transition-colors mt-2">
                Unlock Explorer
            </button>
        </form>
        <p id="loginError" class="text-rose-500 text-[11px] text-center mt-6 hidden font-medium"></p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.detail);

                // Store token and redirect
                localStorage.setItem('slite_token', data.token);
                localStorage.setItem('slite_user', username);
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.innerText = "❌ " + err.message;
                errorEl.classList.remove('hidden');
            }
        };

        // If already logged in, skip to dashboard
        if (localStorage.getItem('slite_token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
