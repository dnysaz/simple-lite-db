<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLiteDB | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .emerald-gradient {
            background: radial-gradient(circle at top left, #3ecf8e 0%, transparent 40%),
                        radial-gradient(circle at bottom right, #064e3b 0%, #0f172a 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center emerald-gradient text-slate-200 overflow-hidden">

    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="w-20 h-20 bg-[#3ecf8e] rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-emerald-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            </div>
            <h1 class="text-4xl font-black text-white tracking-tight mb-2">SimpleLiteDB</h1>
            <p class="text-emerald-400/60 text-xs font-bold uppercase tracking-[0.3em]">Professional Management Suite</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-[2rem] p-10 shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-150">
            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-emerald-400 uppercase tracking-widest ml-1">Username (VPS IP)</label>
                    <div class="relative">
                        <input type="text" id="username" required placeholder="e.g. 145.79.12.100" 
                            class="w-full px-5 py-3.5 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-[#3ecf8e] focus:bg-white/10 text-sm transition-all text-white placeholder:text-slate-500">
                        <svg class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-emerald-400 uppercase tracking-widest ml-1">Dashboard Password</label>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full px-5 py-3.5 bg-white/5 border border-white/10 rounded-2xl outline-none focus:border-[#3ecf8e] focus:bg-white/10 text-sm transition-all text-white placeholder:text-slate-500">
                        <svg class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                </div>
                <button type="submit" class="w-full py-4 bg-[#3ecf8e] hover:bg-[#34b27b] text-white font-black rounded-2xl text-[11px] uppercase tracking-[0.2em] transition-all shadow-xl shadow-emerald-500/20 active:scale-95 mt-4">
                    Unlock Dashboard
                </button>
            </form>
            <p id="loginError" class="text-rose-400 text-xs text-center mt-6 hidden font-bold p-3 bg-rose-500/10 rounded-xl border border-rose-500/20"></p>
        </div>

        <p class="text-center text-slate-500 text-[10px] mt-12 font-bold uppercase tracking-widest">
            &copy; 2024 SimpleLiteDB &bull; System Active
        </p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = e.target.querySelector('button');

            btn.innerText = 'AUTHENTICATING...';
            btn.disabled = true;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.detail);

                // Store token and redirect
                localStorage.setItem('slite_token', data.token);
                localStorage.setItem('slite_user', username);
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.innerText = "ACCESS DENIED: " + err.message.toUpperCase();
                errorEl.classList.remove('hidden');
                btn.innerText = 'UNLOCK DASHBOARD';
                btn.disabled = false;
            }
        };

        // If already logged in, skip to dashboard
        if (localStorage.getItem('slite_token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
