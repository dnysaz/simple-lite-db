<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLiteDB | Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; height: 100vh; overflow: hidden; }
        .terminal-container { height: calc(100vh - 64px); display: flex; flex-direction: column; }
        #terminal-output { flex: 1; overflow-y: auto; padding: 2rem; font-family: 'Fira Code', monospace; font-size: 14px; scroll-behavior: smooth; }
        #terminal-output::-webkit-scrollbar { width: 6px; }
        #terminal-output::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .input-line { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 2rem; background: #1e293b; border-top: 1px solid #334155; font-family: 'Fira Code', monospace; }
        .prompt { color: #3ecf8e; font-weight: bold; }
        #command-input { background: transparent; border: none; outline: none; color: #f8fafc; flex: 1; font-family: inherit; font-size: 14px; }
        .log-entry { margin-bottom: 0.5rem; white-space: pre-wrap; }
        .log-cmd { color: #94a3b8; margin-top: 1rem; }
        .log-res { color: #f8fafc; }
        .log-error { color: #f43f5e; }
        .log-success { color: #3ecf8e; }
        .log-info { color: #38bdf8; }
        table { border-collapse: collapse; margin: 1rem 0; width: 100%; border: 1px solid #334155; }
        th, td { border: 1px solid #334155; padding: 0.5rem 1rem; text-align: left; }
        th { background: #1e293b; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900/50 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white font-black text-xl shadow-[0_0_15px_rgba(16,185,129,0.3)]">S</div>
                <span class="font-extrabold tracking-tighter text-lg">SimpleLiteDB <span class="text-[#3ecf8e]">Terminal</span></span>
            </div>
            <div class="h-4 w-px bg-slate-700 mx-2"></div>
            <span id="current-context" class="text-xs text-slate-500 font-mono">/ (no database)</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/dashboard" class="text-xs font-bold text-slate-400 hover:text-white transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Back to Dashboard
            </a>
        </div>
    </nav>

    <div class="terminal-container">
        <div id="terminal-output">
            <div class="log-entry log-info">Welcome to SimpleLiteDB CLI v1.0.0</div>
            <div class="log-entry text-slate-500 italic text-xs">Type 'HELP' for a list of available commands.</div>
        </div>
        <div class="input-line">
            <span class="prompt">slite></span>
            <input type="text" id="command-input" placeholder="Type SQL or commands..." autofocus spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('terminal-output');
        const input = document.getElementById('command-input');
        const contextDisplay = document.getElementById('current-context');
        
        let currentDb = null;
        let currentApiKey = null;
        let dashToken = localStorage.getItem('slite_token');
        let history = [];
        let historyIdx = -1;

        if (!dashToken) {
            window.location.href = '/dashboard/login';
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim();
                if (!cmd) return;
                
                history.push(cmd);
                historyIdx = history.length;
                input.value = '';
                
                await processCommand(cmd);
            } else if (e.key === 'ArrowUp') {
                if (historyIdx > 0) {
                    historyIdx--;
                    input.value = history[historyIdx];
                }
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                if (historyIdx < history.length - 1) {
                    historyIdx++;
                    input.value = history[historyIdx];
                } else {
                    historyIdx = history.length;
                    input.value = '';
                }
                e.preventDefault();
            }
        });

        async function processCommand(cmd) {
            log(`slite> ${cmd}`, 'cmd');
            
            const upperCmd = cmd.toUpperCase();
            
            if (upperCmd === 'HELP') {
                logHelp();
            } else if (upperCmd === 'CLEAR') {
                output.innerHTML = '';
            } else if (upperCmd === 'LIST DATABASES') {
                await listDatabases();
            } else if (upperCmd.startsWith('USE ')) {
                await useDatabase(cmd.split(' ')[1]);
            } else if (upperCmd.startsWith('CREATE DATABASE ')) {
                await createDatabase(cmd.split(' ')[2]);
            } else if (upperCmd.startsWith('DELETE DATABASE ')) {
                await deleteDatabase(cmd.split(' ')[2]);
            } else {
                // Default to SQL
                await runSql(cmd);
            }
            
            output.scrollTop = output.scrollHeight;
        }

        function log(msg, type = 'res') {
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            div.innerHTML = msg;
            output.appendChild(div);
        }

        function logHelp() {
            log(`
Available Commands:
  HELP                       Show this help
  CLEAR                      Clear screen
  LIST DATABASES             List all available databases
  USE <db_name>              Switch to a database context
  CREATE DATABASE <name>     Create a new database
  DELETE DATABASE <name>     Delete a database
  
Standard SQL:
  SELECT, INSERT, UPDATE, DELETE, CREATE TABLE, DROP TABLE, etc.
  (Requires switching to a database first using USE)
            `, 'info');
        }

        async function listDatabases() {
            try {
                const res = await fetch('/admin/databases', {
                    headers: { 'Authorization': `Bearer ${dashToken}` }
                });
                const d = await res.json();
                if (d.success) {
                    let html = '<table><tr><th>Name</th><th>API Key</th></tr>';
                    d.databases.forEach(db => {
                        html += `<tr><td>${db.name}</td><td class="text-[10px] text-slate-500">${db.api_key}</td></tr>`;
                    });
                    html += '</table>';
                    log(html);
                } else log(d.error, 'error');
            } catch (e) { log(e.message, 'error'); }
        }

        async function useDatabase(name) {
            if (!name) return log('Usage: USE <db_name>', 'error');
            try {
                const res = await fetch('/admin/databases', {
                    headers: { 'Authorization': `Bearer ${dashToken}` }
                });
                const d = await res.json();
                const db = d.databases.find(x => x.name === name);
                if (db) {
                    currentDb = db.name;
                    currentApiKey = db.api_key;
                    contextDisplay.innerText = `/ ${currentDb}`;
                    log(`Context switched to: ${currentDb}`, 'success');
                } else log(`Database '${name}' not found.`, 'error');
            } catch (e) { log(e.message, 'error'); }
        }

        async function createDatabase(name) {
            if (!name) return log('Usage: CREATE DATABASE <name>', 'error');
            try {
                const res = await fetch('/admin/create_db', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${dashToken}` 
                    },
                    body: JSON.stringify({ name })
                });
                const d = await res.json();
                if (d.success) log(`Database '${d.name}' created with API Key: ${d.api_key}`, 'success');
                else log(d.error, 'error');
            } catch (e) { log(e.message, 'error'); }
        }

        async function deleteDatabase(name) {
            if (!name) return log('Usage: DELETE DATABASE <name>', 'error');
            if (!confirm(`Are you sure you want to delete '${name}'?`)) return;
            try {
                const res = await fetch('/admin/delete_db', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${dashToken}` 
                    },
                    body: JSON.stringify({ name })
                });
                const d = await res.json();
                if (d.success) {
                    log(`Database '${name}' deleted.`, 'success');
                    if (currentDb === name) {
                        currentDb = null;
                        currentApiKey = null;
                        contextDisplay.innerText = `/ (no database)`;
                    }
                } else log(d.error, 'error');
            } catch (e) { log(e.message, 'error'); }
        }

        async function runSql(sql) {
            if (!currentDb) return log('Error: No database selected. Use "USE <db_name>" first.', 'error');
            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentApiKey}`
                    },
                    body: JSON.stringify({ database: currentDb, sql })
                });
                const d = await res.json();
                if (d.success) {
                    if (d.rows && d.rows.length > 0) {
                        const cols = Object.keys(d.rows[0]);
                        let html = '<table><tr>';
                        cols.forEach(c => html += `<th>${c}</th>`);
                        html += '</tr>';
                        d.rows.forEach(r => {
                            html += '<tr>';
                            cols.forEach(c => html += `<td>${r[c]}</td>`);
                            html += '</tr>';
                        });
                        html += '</table>';
                        log(html);
                    } else {
                        log('Query OK. (No rows returned)', 'success');
                    }
                } else log(d.error, 'error');
            } catch (e) { log(e.message, 'error'); }
        }
    </script>
</body>
</html>
