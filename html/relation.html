<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relation Map | SimpleLiteDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mermaid { display: flex; justify-center: center; }
    </style>
</head>
<body class="p-12">
    <div class="max-w-7xl mx-auto">
        <div class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Relational Schema Map</h1>
                <p class="text-slate-500 mt-2">Visual representation of tables and their foreign key relationships.</p>
            </div>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-white border border-slate-100 px-4 py-2 rounded-lg shadow-sm">
                Generated via Mermaid.js
            </div>
        </div>

        <div class="bg-white border border-slate-100 rounded-3xl shadow-sm p-16 overflow-auto custom-scrollbar min-h-[700px] flex justify-center">
            <div id="diagram" class="w-full">
                <div class="flex items-center justify-center p-20">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#3ecf8e]"></div>
                </div>
            </div>
        </div>
        
        <div class="mt-8 text-center text-slate-400 text-xs font-medium">
            &copy; 2026 SimpleLiteDB Explorer • Smart Relational Mapping
        </div>
    </div>

    <script>
        // This file is designed to be loaded within the dashboard context
        // but can also work standalone if data is provided.
        window.addEventListener('message', async (event) => {
            if (event.data.type === 'render') {
                const erString = event.data.definition;
                const container = document.getElementById('diagram');
                container.innerHTML = `<pre class="mermaid">${erString}</pre>`;
                mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
                await mermaid.run();
            }
        });
    </script>
</body>
</html>
